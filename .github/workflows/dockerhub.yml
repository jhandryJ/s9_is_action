name: Subir imagen a docker

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Contruir y Subir imagen a Docker Hub
    runs-on: ubuntu-latest
    
    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4
        
      - name: Iniciar sesion en Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Construir y subir la imagen
        uses: docker/build-push-action@v6
        with:  
          context: .  
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mi-primer-imagen:latest
          